name: Windows Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Python 3.11 einrichten
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_windows.txt

      - name: SRAL bauen (SRAL.dll)
        run: |
          git clone https://github.com/m1maker/SRAL C:\SRAL
          cmake C:\SRAL -B C:\SRAL\build -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON
          cmake --build C:\SRAL\build --config Release
          New-Item -ItemType Directory -Force -Path "third_party\sral\windows"
          Copy-Item "C:\SRAL\build\Release\SRAL.dll" "third_party\sral\windows\SRAL.dll"
          Copy-Item "C:\SRAL\Bindings\Python\sral.py" "third_party\sral\sral.py"

      - name: Version aus app.py lesen
        id: version
        shell: python
        run: |
          import re, os
          with open("src/app_wx.py", encoding="utf-8") as f:
              content = f.read()
          m = re.search(r'APP_VERSION\s*=\s*["\']([^"\']+)["\']', content)
          version = m.group(1) if m else "unknown"
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"version={version}\n")

      - name: PyInstaller Build
        run: |
          pyinstaller -y "TeamTalk VO Client_win.spec"

      - name: ZIP erstellen
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $zipName = "TeamTalk-VO-Client-${version}-windows.zip"
          Compress-Archive -Path "dist\TeamTalk VO Client\*" -DestinationPath "dist\$zipName"
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: GitHub Release erstellen und ZIP hochladen
        uses: softprops/action-gh-release@v3
        with:
          name: "TeamTalk VO Client ${{ steps.version.outputs.version }}"
          body: |
            Windows-Build für Version ${{ steps.version.outputs.version }}.

            **Installation:** ZIP entpacken und `TeamTalk VO Client.exe` starten.
          files: dist/${{ env.ZIP_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Gitea Release synchronisieren
        shell: pwsh
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $zipPath = "dist\$env:ZIP_NAME"
          $token = $env:GITEA_TOKEN
          $base = "https://git.garogaming.xyz/api/v1/repos/flarion/TeamTalk-VO-Client"
          $headers = @{ "Authorization" = "token $token"; "Content-Type" = "application/json" }

          # Gitea-Release für diesen Tag holen
          try {
            $release = Invoke-RestMethod -Uri "$base/releases/tags/$tag" -Headers $headers -ErrorAction Stop
            $releaseId = $release.id
            Write-Host "Gitea-Release gefunden: ID $releaseId"
          } catch {
            # Release existiert noch nicht – erstellen
            Write-Host "Gitea-Release $tag nicht gefunden – erstelle..."
            $body = @{ tag_name = $tag; name = $tag; body = "Windows-Build $tag"; draft = $false; prerelease = $false } | ConvertTo-Json
            try {
              $release = Invoke-RestMethod -Method Post -Uri "$base/releases" -Headers $headers -Body $body -ErrorAction Stop
              $releaseId = $release.id
              Write-Host "Gitea-Release erstellt: ID $releaseId"
            } catch {
              Write-Host "Gitea-Release konnte nicht erstellt werden: $_"
              exit 0
            }
          }

          # Prüfen ob Windows-ZIP schon hochgeladen
          $assets = Invoke-RestMethod -Uri "$base/releases/$releaseId/assets" -Headers @{ "Authorization" = "token $token" } -ErrorAction SilentlyContinue
          $existing = $assets | Where-Object { $_.name -match "windows" }
          if ($existing) {
            Write-Host "Windows-ZIP bereits auf Gitea vorhanden ($($existing.name)) – überspringe Upload"
            exit 0
          }

          # ZIP hochladen (multipart via curl, da Invoke-RestMethod kein -F unterstützt)
          Write-Host "Lade $env:ZIP_NAME auf Gitea hoch (Release $releaseId)..."
          $result = & curl -s -X POST "$base/releases/$releaseId/assets" `
            -H "Authorization: token $token" `
            -F "attachment=@$zipPath"
          Write-Host "Gitea Upload Antwort: $result"
