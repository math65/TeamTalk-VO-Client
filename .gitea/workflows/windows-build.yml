name: Windows Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: [self-hosted, windows]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install Dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build EXE
        shell: pwsh
        run: |
          pyinstaller --noconfirm "TeamTalk VO Client_win.spec"

      - name: Package
        shell: pwsh
        run: |
          if (Test-Path "dist/TeamTalk VO Client") { Remove-Item -Recurse -Force "dist/TeamTalk VO Client" }
          New-Item -ItemType Directory -Force -Path "dist/TeamTalk VO Client" | Out-Null
          Copy-Item -Recurse -Force "dist/TeamTalk VO Client.exe" "dist/TeamTalk VO Client/"
          Compress-Archive -Path "dist/TeamTalk VO Client" -DestinationPath "dist/TeamTalk-VO-Client-win64.zip" -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TeamTalk-VO-Client-win64
          path: dist/TeamTalk-VO-Client-win64.zip
